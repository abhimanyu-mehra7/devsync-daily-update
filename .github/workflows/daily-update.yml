name: DevSync Daily Commit

on:
  schedule:
    - cron: '20 9 * * *'   # Runs every day at 09:20 UTC
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 24ds2000003@ds.study.iitm.ac.in - Update daily log
        run: |
          echo "Updated on $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "24ds2000003@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated commit - DevSync"
          git push
