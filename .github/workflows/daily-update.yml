name: DevSync Daily Commit

on:
  schedule:
    - cron: '25 9 * * *'   # Runs daily at 09:25 UTC
  workflow_dispatch:

permissions:
  contents: write   # IMPORTANT: allows pushing commits

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 24ds2000003@ds.study.iitm.ac.in - Update daily log
        run: |
          echo "Updated on $(date)" >> daily-log.txt

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "24ds2000003@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated commit - DevSync" || echo "No changes to commit"
          git push
